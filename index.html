<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VivaKids</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0f172a;
      color:white;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:100%;
      max-width:400px;
      text-align:center;
      padding:20px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    p{
      opacity:0.8;
      margin-bottom:40px;
    }

    .btn{
      width:100%;
      border:none;
      padding:18px;
      border-radius:16px;
      font-size:18px;
      margin-bottom:15px;
      cursor:pointer;
    }

    .kids{
      background:#38bdf8;
      color:white;
    }

    .pais{
      background:#22c55e;
      color:white;
    }

  </style>
</head>

<body>

  <div class="container">

    <h1>VivaKids</h1>

    <p>
      Rotina inteligente para crianças e pais
    </p>

    <button class="btn kids">
      👦 Área da Criança
    </button>

    <button class="btn pais">
      👨 Área dos Pais
    </button>

  </div>

</body>
</html>
